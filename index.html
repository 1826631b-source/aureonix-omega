<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureonix Omega</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Aureonix Omega</h1>
        <p>Tu portal de exploración tecnológica</p>
    </header>

    <main>
        <!-- Sección de la Inteligencia Artificial -->
        <section class="ia-container">
            <h2>Explorador Inteligente Aureonix</h2>
            <p>Haz una pregunta y la IA buscará la respuesta en la web en tiempo real.</p>
            
            <div class="ia-search-box">
                <input type="text" id="ia-input" placeholder="¿Qué deseas buscar en internet hoy?">
                <button id="ia-btn">Buscar con IA</button>
            </div>

            <!-- Recuadro donde se mostrará la respuesta -->
            <div id="ia-output" class="ia-response-box" style="display: none;">
                <strong>Respuesta de la IA:</strong>
                <p id="ia-text">Pensando...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
